services:

  postgres-app:
    image: postgres:16-alpine
    container_name: sql-client-postgres-app
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${APP_DB_USER}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_DB:       ${APP_DB_NAME}
    ports:
      - "${APP_DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./backend/migrations/init-db/init-app-db.sql:/docker-entrypoint-initdb.d/init-app-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sql-client-net

  postgres-sandbox:
    image: postgres:16-alpine
    container_name: sql-client-postgres-sandbox
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${SANDBOX_DB_USER}
      POSTGRES_PASSWORD: ${SANDBOX_DB_PASSWORD}
      POSTGRES_DB:       ${SANDBOX_DB_NAME}
    ports:
      - "${SANDBOX_DB_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_sandbox_data:/var/lib/postgresql/data
      - ./backend/migrations/init-db/init-sandbox-db.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/migrations/init-db/seed-sandbox.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SANDBOX_DB_USER} -d ${SANDBOX_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sql-client-net

  backend:
    build:
      context: ./backend/sql-client
      dockerfile: Dockerfile
    container_name: sql-client-backend
    restart: unless-stopped
    environment:
      APP_DB_DSN:       ${APP_DB_DSN}
      SANDBOX_DB_DSN:   ${SANDBOX_DB_DSN}
      GRPC_PORT:        ${GRPC_PORT:-9090}
      QUERY_TIMEOUT_MS: ${QUERY_TIMEOUT_MS:-5000}
      MAX_ROWS:         ${MAX_ROWS:-500}
    depends_on:
      postgres-app:
        condition: service_healthy
      postgres-sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${GRPC_PORT:-9090} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sql-client-net

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: sql-client-envoy
    restart: unless-stopped
    ports:
      - "${ENVOY_PORT:-8080}:8080"
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "warn"]
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sql-client-net

  frontend-sql-workbench:
    image: node:22-alpine
    container_name: sql-client-frontend-sql-workbench
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm run build --workspace=frontend/apps/sql-workbench &&
             npm run preview --workspace=frontend/apps/sql-workbench -- --host 0.0.0.0 --port 5174 --strictPort"
    environment:
      WORKBENCH_PORT: ${WORKBENCH_PORT:-5174}
      VITE_APP_API_URL: ${VITE_APP_API_URL}
      VITE_APP_GRPC_WEB_BASE_URL: ${VITE_APP_GRPC_WEB_BASE_URL}
      VITE_APP_TITLE: ${VITE_APP_TITLE}
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/node_modules
    ports:
      - "${WORKBENCH_PORT:-5174}:5174"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5174/', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      envoy:
        condition: service_started
    networks:
      - sql-client-net

  frontend-host:
    image: node:22-alpine
    container_name: sql-client-frontend-host
    restart: unless-stopped
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm run dev --workspace=frontend/apps/host -- --host 0.0.0.0 --strictPort"
    environment:
      HOST_PORT: ${HOST_PORT:-5173}
      VITE_APP_API_URL: ${VITE_APP_API_URL}
      VITE_APP_GRPC_WEB_BASE_URL: ${VITE_APP_GRPC_WEB_BASE_URL}
      VITE_APP_TITLE: ${VITE_APP_TITLE}
    volumes:
      - ./:/workspace
      - frontend_node_modules:/workspace/node_modules
    ports:
      - "${HOST_PORT:-5173}:5173"
    depends_on:
      frontend-sql-workbench:
        condition: service_healthy
      envoy:
        condition: service_started
    networks:
      - sql-client-net

volumes:
  postgres_app_data:
  postgres_sandbox_data:
  frontend_node_modules:

networks:
  sql-client-net:
    driver: bridge
